name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Check formatting
        run: make fmt-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Run go vet
        run: make vet

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run tests with race detector
        run: make test-race

      - name: Generate coverage report
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out -o=coverage.txt

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total coverage: ${COVERAGE}%"
          TARGET=80
          if (( $(echo "$COVERAGE < $TARGET" | bc -l) )); then
            echo "::warning::Coverage ${COVERAGE}% is below target threshold of ${TARGET}%"
            echo "Current coverage does not meet the 80% target. This is tracked for improvement."
          else
            echo "Coverage meets or exceeds the ${TARGET}% threshold."
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build binary
        run: make build

      - name: Verify binary
        run: test -x ./pr-wrangler

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: pr-wrangler-linux-amd64
          path: pr-wrangler

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum needs updating" && exit 1)
          go mod verify

  preview:
    name: UI Preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Only issues:write is required — the preview comment is posted via the
      # Issues API (github.rest.issues.createComment / updateComment), which
      # works for PR comments because PRs are issues under the hood.
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache: true

      - name: Build binary
        run: make build

      - name: Capture demo render
        run: ./pr-wrangler demo --render > preview.txt

      - name: Install freeze
        # Pinned for reproducible preview output. Bump deliberately
        # rather than tracking @latest, which would let a freeze
        # release silently change the rendered PR comment/image.
        # Available versions: https://github.com/charmbracelet/freeze/releases
        run: go install github.com/charmbracelet/freeze@v0.2.2

      - name: Render preview to PNG and SVG
        # freeze's documented ANSI usage is stdin-based
        # (`cat file | freeze --language ansi -o out.png`). Passing the
        # input file positionally works locally but errored with
        # "No input / check --lines is within bounds" on the runner, so
        # redirect stdin from preview.txt to match the docs and avoid the
        # ambiguous positional-vs-stdin code path inside freeze.
        run: |
          "$(go env GOPATH)/bin/freeze" --language ansi --output preview.png < preview.txt
          "$(go env GOPATH)/bin/freeze" --language ansi --output preview.svg < preview.txt

      - name: Install VHS and dependencies
        # Don't use charmbracelet/vhs-action@v2 — its internal "Installing
        # latest ffmpeg..." step fails on the ubuntu-latest runner with
        # "Failed to install ffmpeg" (ffmpeg is no longer in the runner
        # image's default toolset). Provisioning manually mirrors the
        # freeze pinned-install pattern and keeps everything explicit:
        #   - ffmpeg:           apt
        #   - ttyd:             apt (universe)
        #   - fonts-liberation: apt (replaces vhs-action's install-fonts)
        #   - vhs:              go install at pinned version
        # Bump the vhs pin deliberately when needed.
        # Releases: https://github.com/charmbracelet/vhs/releases
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg ttyd fonts-liberation
          go install github.com/charmbracelet/vhs@v0.11.0

      - name: Render animated demo with VHS
        run: |
          "$(go env GOPATH)/bin/vhs" demo.tape

      - name: Upload preview artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ui-preview
          path: |
            preview.txt
            preview.png
            preview.svg
            demo.gif

      # Skip on forks: GitHub downgrades GITHUB_TOKEN to read-only for
      # pull_request runs from a forked head repo, so issues:write is
      # ignored and createComment/updateComment 403s. The artifacts above
      # are still uploaded for fork PRs — reviewers can pull them from the
      # workflow run page.
      - name: Post or update PR preview comment
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: actions/github-script@v8
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-wrangler:ui-preview -->';
            const preview = fs.readFileSync('preview.txt', 'utf8');
            const runUrl = process.env.RUN_URL;
            const body = [
              marker,
              '## 🖥️ UI Preview',
              '',
              `_Auto-generated render of \`pr-wrangler demo --render\` for this PR. The PNG/SVG/GIF assets are attached to the [workflow run](${runUrl}) as the \`ui-preview\` artifact._`,
              '',
              '```ansi',
              preview,
              '```',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
              core.info(`Updated preview comment ${existing.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
              core.info(`Created preview comment ${created.id}`);
            }
