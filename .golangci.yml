version: "2"

run:
  modules-download-mode: readonly
  tests: true

linters:
  enable:
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    errcheck:
      check-type-assertions: true
    misspell:
      locale: UK
    revive:
      rules:
        - name: var-naming
          severity: warning
          disabled: false
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      - linters:
          - staticcheck
        text: "ST1000:"
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
